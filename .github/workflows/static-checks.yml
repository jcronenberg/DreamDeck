name: "Static checks"

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:

  changes:
    runs-on: ubuntu-latest
    outputs:
      touch: ${{ steps.filter.outputs.touch }}
      ssh: ${{ steps.filter.outputs.ssh }}
      gdscript: ${{ steps.filter.outputs.gdscript }}
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Check changed files
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          touch:
            - 'plugins/touch/rust/**/*.rs'
          ssh:
            - 'plugins/ssh/rust/**/*.rs'
          gdscript:
            - 'plugins/**/*.gd'
            - 'src/**/*.gd'

  rust_touch_checks:
    name: Rust checks for touch plugin
    needs: changes
    if: ${{ needs.changes.outputs.touch == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Install toolchain
      run: rustup toolchain install stable
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          plugins/touch/rust/target/
        key: static-touch-cargo-${{ hashFiles('plugins/touch/rust/Cargo.lock') }}
    - name: Lint tests
      run: cargo fmt --all -- --check
      working-directory: ./plugins/touch/rust
    - name: Cargo clippy
      run: cargo clippy -- --no-deps -D warnings
      working-directory: ./plugins/touch/rust

  rust_ssh_checks:
    name: Rust checks for ssh plugin
    needs: changes
    if: ${{ needs.changes.outputs.ssh == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - name: Git Checkout
      uses: actions/checkout@v4
    - name: Install toolchain
      run: rustup toolchain install stable
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          plugins/ssh/rust/target/
        key: static-ssh-cargo-${{ hashFiles('plugins/ssh/rust/Cargo.lock') }}
    - name: Lint tests
      run: cargo fmt --all -- --check
      working-directory: ./plugins/ssh/rust
    - name: Cargo clippy
      run: cargo clippy -- --no-deps -D warnings
      working-directory: ./plugins/ssh/rust

  gd_checks:
    name: GDScript checks
    needs: changes
    if: ${{ needs.changes.outputs.gdscript == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: Scony/godot-gdscript-toolkit@master
      - name: Formatting checks
        run: gdformat --diff .
      - name: Linting checks
        run: gdlint .

  spell_checks:
    name: Spell checks
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Spell checks via codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: ./addons,./addon_submodules,godottpd,Cargo.lock
          ignore_words_list: couldn