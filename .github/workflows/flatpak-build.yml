name: "Flatpak build"

on:
  pull_request:
  push:
    branches:
      - prototyping

jobs:
  flatpak-build:
    name: Flatpak build
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup
        run: |
          # Install requirements for the next steps
          dnf install -y python3 python3-toml python3-aiohttp wget godot
          # Create pck file
          godot --headless --import || true
          godot --headless --export-pack "Linux" dreamdeck.pck
          # Download generator for cargo offline sources
          wget https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/refs/heads/master/cargo/flatpak-cargo-generator.py
          # Run cargo offline sources generator
          python3 flatpak-cargo-generator.py -o dist/cargo-source1.json plugins/ssh/rust/Cargo.lock
          python3 flatpak-cargo-generator.py -o dist/cargo-source2.json plugins/touch/rust/Cargo.lock
      - name: Build flatpak
        # Upstream one is currently broken, need to use a fork meanwhile
        # TODO switch to upstream once it's fixed
        #uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        uses: jochumdev/flatpak-github-actions/flatpak-builder@builder-update-deps
        with:
          bundle: dreamdeck.flatpak
          manifest-path: dist/dev.jcronenberg.DreamDeck.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamdeck-flatpak
          path: ./dreamdeck.flatpak